services:
  shukatsu-agent:
    build: .
    container_name: shukatsu-agent
    ports:
      - "5001:5000"  # Host 5001 → Container 5000 (avoid conflict with local dev on 5000)
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
